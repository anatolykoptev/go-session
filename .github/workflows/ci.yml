name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  GOWORK: "off"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test root module
        run: go test -race -coverprofile=coverage.txt ./...
      - name: Test redis sub-module
        run: cd redis && go test -race ./...
      - name: Test archive sub-module
        run: cd archive && go test -race ./...
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.txt
